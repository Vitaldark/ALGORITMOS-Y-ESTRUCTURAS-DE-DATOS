<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Simulador de Búsquedas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .box {
            width: 45px;
            height: 45px;
            margin: 5px;
            border-radius: 10px;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.4s;
            font-weight: bold;
        }

        .active {
            background: #ef4444;
            transform: scale(1.2);
        }

        .range {
            background: #3b82f6;
        }

        .found {
            background: #22c55e;
            transform: scale(1.3);
        }

        .low {
            background: #9333ea;
        }

        .high {
            background: #f97316;
        }

        .panel {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
        }

        pre {
            color: #22c55e;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="container-fluid p-3">

        <h2 class="text-center text-success mb-3">Simulador de Búsquedas</h2>

        <div class="text-center mb-3">
            <input id="target" class="form-control w-25 d-inline" placeholder="Número">
            <br><br>

            <button class="btn btn-success" onclick="setSize(20)">Corta</button>
            <button class="btn btn-warning" onclick="setSize(50)">Larga</button>

            <br><br>

            <button class="btn btn-primary" onclick="lineal()">Lineal</button>
            <button class="btn btn-info" onclick="binaria()">Binaria</button>
            <button class="btn btn-secondary" onclick="exponencial()">Exponencial</button>
            <button class="btn btn-danger" onclick="interpolacion()">Interpolación</button>
        </div>

        <div class="row">

            <div class="col-md-3">
                <div class="panel">
                    <h5>Seguimiento de Codigo</h5>
                    <table class="table table-dark table-sm" id="tabla">
                        <tr>
                            <th>#</th>
                            <th>L</th>
                            <th>M</th>
                            <th>H</th>
                        </tr>
                    </table>
                </div>
            </div>

            <div class="col-md-6 text-center">
                <div id="array" class="d-flex flex-wrap justify-content-center"></div>
                <p id="info"></p>
            </div>

            <div class="col-md-3">
                <div class="panel">
                    <h5>Código del algoritmo</h5>
                    <pre id="codigo"></pre>
                </div>
            </div>

        </div>
    </div>

    <script>
        let arr = [];

        function generar(n){
            arr = [];
            let val = 0;
            for (let i = 0; i < n; i++) {
                val += Math.floor(Math.random() * 5) + 1;
                arr.push(val);
            }
        }
        generar(20);

        const cont = document.getElementById("array");
        const tabla = document.getElementById("tabla");
        const codigo = document.getElementById("codigo");
        const info = document.getElementById("info");

        function draw(s = {}){
            cont.innerHTML = "";
            arr.forEach((v, i) => {
                let d = document.createElement("div");
                d.className = "box";
                if (s.active === i) d.classList.add("active");
                if (s.range && s.range.includes(i)) d.classList.add("range");
                if (s.low === i) d.classList.add("low");
                if (s.high === i) d.classList.add("high");
                if (s.found === i) d.classList.add("found");
                d.innerText = v;
                cont.appendChild(d);
            });
        }

        function addRow(p, l, m, h){
            tabla.innerHTML += `<tr><td>${p}</td><td>${l ?? ""}</td><td>${m ?? ""}</td><td>${h ?? ""}</td></tr>`;
        }

        function resetTabla(){
            tabla.innerHTML = "<tr><th>#</th><th>L</th><th>M</th><th>H</th></tr>";
        }

        function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

        function setSize(n){ generar(n); draw(); }

        function validar(x){
            if(isNaN(x)){
                info.innerHTML = "<span style='color:yellow;'>⚠️ Ingresa un número válido</span>";
                return false;
            }
            return true;
        }

        const codigos = {
            lineal: `for (size_t i=0;i<a.size();++i) if(a[i]==x) return (int)i;
`,
            binaria: `while(l<=r){
 int m = l + (r-l)/2;
 if(a[m]==x) return m;
 else if(a[m]<x) l=m+1;
 else r=m-1;
 }
 low<=high:  mid=(low+high)/2`,
            exponencial: `
 while(i<(int)a.size() && a[i] < x) i<<=1; // duplica rango
 int l = i/2, r = min(i,(int)a.size()-1);
 
 while(l<=r){
 int m = l + (r-l)/2;
 if(a[m]==x) return m;
 else if(a[m]<x) l=m+1;
 else r=m-1;
 }
`,
            interpolacion: `while(low<=high && x>=a[low] && x<=a[high]){
 if(a[low]==a[high]) return (a[low]==x? low: -1);

 long long pos = low + (long long)( (double)(high-low) * (
(double)(x-a[low]) / (double)(a[high]-a[low]) ) );
 if(pos<low || pos>high) break;
 if(a[pos]==x) return (int)pos;
 if(a[pos]<x) low=(int)pos+1; else high=(int)pos-1;
 `
        };

        async function lineal(){
            codigo.innerText = codigos.lineal;
            resetTabla();
            let x = parseInt(target.value);
            if (!validar(x)) return;

            for(let i = 0; i < arr.length; i++){
                draw({ active: i });
                addRow(i, "-", i, "-");
                await sleep(300);

                if(arr[i] == x){
                    draw({ found: i });
                    info.innerHTML = "<span style='color:#22c55e;'>✅ Encontrado</span>";
                    return;
                }
            }
            info.innerHTML = "<span style='color:#ef4444;'>❌ Número no encontrado</span>";
        }

        async function binaria(){
            codigo.innerText = codigos.binaria;
            resetTabla();
            let x = parseInt(target.value);
            if (!validar(x)) return;

            let l = 0, r = arr.length - 1, p = 0;

            while(l <= r){
                let m = Math.floor((l + r) / 2);
                draw({ range: [...Array(r - l + 1).keys()].map(i => i + l), active: m, low: l, high: r });
                addRow(p++, l, m, r);
                await sleep(500);

                if(arr[m] == x){
                    draw({ found: m });
                    info.innerHTML = "<span style='color:#22c55e;'>✅ Encontrado</span>";
                    return;
                }
                if(arr[m] < x) l = m + 1; else r = m - 1;
            }
            info.innerHTML = "<span style='color:#ef4444;'>❌ Número no encontrado</span>";
        }

        async function exponencial(){
            codigo.innerText = codigos.exponencial;
            resetTabla();
            let x = parseInt(target.value);
            if (!validar(x)) return;

            let i = 1, p = 0;

            while(i < arr.length && arr[i] < x){
                draw({ active: i });
                addRow(p++, "-", i, "-");
                await sleep(400);
                i *= 2;
            }

            let l = Math.floor(i / 2), r = Math.min(i, arr.length - 1);

            while(l <= r){
                let m = Math.floor((l + r) / 2);
                draw({ active: m });
                addRow(p++, l, m, r);
                await sleep(400);

                if(arr[m] == x){
                    draw({ found: m });
                    info.innerHTML = "<span style='color:#22c55e;'>✅ Encontrado</span>";
                    return;
                }
                if(arr[m] < x) l = m + 1; else r = m - 1;
            }
            info.innerHTML = "<span style='color:#ef4444;'>❌ Número no encontrado</span>";
        }

        async function interpolacion(){
            codigo.innerText = codigos.interpolacion;
            resetTabla();
            let x = parseInt(target.value);
            if (!validar(x)) return;

            let l = 0, h = arr.length - 1, p = 0;

            while(l <= h && x >= arr[l] && x <= arr[h]){
                let pos = Math.floor(l + (h - l) * (x - arr[l]) / (arr[h] - arr[l]));
                draw({ active: pos });
                addRow(p++, l, pos, h);
                await sleep(500);

                if(arr[pos] == x){
                    draw({ found: pos });
                    info.innerHTML = "<span style='color:#22c55e;'>✅ Encontrado</span>";
                    return;
                }
                if(arr[pos] < x) l = pos+1; else h = pos-1;
            }
            info.innerHTML="<span style='color:#ef4444;'>❌ Número no encontrado</span>";
        }

        draw();
    </script>
</body>

</html>
